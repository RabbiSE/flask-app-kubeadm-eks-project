apiVersion: apps/v1
kind: Deployment
metadata:
  name: two-tier-app-deployment
  labels:
    app: two-tier-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: two-tier-app
  template:
    metadata:
      labels:
        app: two-tier-app
    spec:
      containers:
        - name: two-tier-app
          image: rabbise/two-tier-flask-app:latest
          env:
            - name: MYSQL_HOST
              value: "10.108.101.28"          # this is your mysql's service clusture IP, Make sure to change it with yours
            - name: MYSQL_PASSWORD
              value: "root"
            - name: MYSQL_USER
              value: "root"
            - name: MYSQL_DB
              value: "devops"
          ports:
            - containerPort: 5000
          imagePullPolicy: Always
